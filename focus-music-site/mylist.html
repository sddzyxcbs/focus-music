<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My List — FocusFlow Music</title>
  <meta name="description" content="Your personal curated playlist on FocusFlow Music. Manage, reorder, and play tracks you've saved for focused work and study." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://focusflowmusic.com/mylist.html" />
  <link rel="stylesheet" href="style.css" />

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ========== HEADER ========== -->
<header>
  <div class="header-inner">
    <a href="index.html" class="site-title" aria-label="FocusFlow Music Home">🎵 FocusFlow Music</a>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </button>
    <!-- Nav + Auth wrapper -->
    <div class="header-right">
      <nav id="main-nav" role="navigation" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="mylist.html" class="active">My List</a>
        <a href="subscribe.html">Subscribe</a>
        <a href="about.html">About Us</a>
      </nav>
      <div id="auth-ui" class="auth-ui" aria-live="polite">
        <button id="btn-login" class="btn-login" onclick="signInWithGoogle()" aria-label="Sign in with Google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="14" height="14" />
          Sign in
        </button>
        <div id="user-info" class="user-info hidden">
          <img id="user-avatar" class="user-avatar" src="" alt="" width="26" height="26" />
          <span id="user-name" class="user-name"></span>
          <button id="btn-logout" class="btn-logout" onclick="signOutUser()" aria-label="Sign out">✕</button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero" aria-labelledby="page-heading">
  <h2 id="page-heading">My Playlist</h2>
  <p>Your personal focus collection. Drag to reorder, click to play.</p>
</section>

<!-- ========== MAIN ========== -->
<main class="mylist-container" aria-label="My playlist">
  <div id="mylist-content"></div>
</main>

<!-- ========== STICKY PLAYER ========== -->
<div class="player-bar" role="region" aria-label="Audio player">
  <div class="player-inner">
    <div class="player-info">
      <div class="player-song-title" id="p-title">No track selected</div>
      <div class="player-song-artist" id="p-artist">— Press play or Play All —</div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="btn-shuffle" title="Shuffle (S)" onclick="toggleShuffle()" aria-label="Shuffle">🔀</button>
      <button class="ctrl-btn" id="btn-prev"    title="Previous (←)" onclick="playPrev()"    aria-label="Previous">⏮</button>
      <button class="ctrl-play-main" id="btn-play-main" onclick="togglePlay()" aria-label="Play / Pause">▶</button>
      <button class="ctrl-btn" id="btn-next"    title="Next (→)"     onclick="playNext()"    aria-label="Next">⏭</button>
      <button class="ctrl-btn" id="btn-loop"    title="Loop mode (L)" onclick="cycleLoop()"  aria-label="Loop mode">🔁</button>
    </div>
    <div class="progress-wrap">
      <span class="progress-time" id="p-current">0:00</span>
      <input type="range" class="progress-slider" id="progress-slider"
             min="0" max="100" value="0"
             oninput="seekTo(this.value)" aria-label="Playback progress" />
      <span class="progress-time" id="p-total">0:00</span>
    </div>
    <div class="volume-wrap">
      <span class="vol-icon" aria-hidden="true" onclick="toggleMute()" title="Mute (M)">🔊</span>
      <input type="range" class="volume-slider" id="volume-slider"
             min="0" max="1" step="0.02" value="0.7"
             oninput="setVolume(this.value)" aria-label="Volume" />
    </div>
  </div>
</div>

<!-- ========== FOOTER ========== -->
<footer>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="mylist.html">My List</a>
    <a href="subscribe.html">Subscribe</a>
    <a href="about.html">About Us</a>
  </div>
  <p>© 2024 FocusFlow Music. All rights reserved.</p>
</footer>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="assertive"></div>

<!-- ========== SCRIPTS ========== -->
<script>
/* ============================================================
   FIREBASE INIT
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyANrNKpx7otJzH7KFRjLuittd-hwL4Q8yw",
  authDomain: "focusflow-music.firebaseapp.com",
  projectId: "focusflow-music",
  storageBucket: "focusflow-music.firebasestorage.app",
  messagingSenderId: "911347921304",
  appId: "1:911347921304:web:314337e8308b2b99fb3bed"
};

firebase.initializeApp(firebaseConfig);
const db    = firebase.firestore();
const auth  = firebase.auth();
const GoogleProvider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;

function syncAuthUI(user) {
  const btnLogin   = document.getElementById('btn-login');
  const userInfo   = document.getElementById('user-info');
  const userAvatar = document.getElementById('user-avatar');
  const userName   = document.getElementById('user-name');
  if (user) {
    btnLogin.classList.add('hidden');
    userInfo.classList.remove('hidden');
    userAvatar.src  = user.photoURL || '';
    userAvatar.alt  = user.displayName || 'User';
    userName.textContent = user.displayName || user.email || '';
  } else {
    btnLogin.classList.remove('hidden');
    userInfo.classList.add('hidden');
    userAvatar.src = '';
    userName.textContent = '';
  }
}

async function saveMyListToFirestore() {
  if (!currentUser) return;
  await db.collection('users').doc(currentUser.uid).set({ list: myList }, { merge: true });
}

async function signInWithGoogle() {
  try { await auth.signInWithPopup(GoogleProvider); }
  catch(e) { showToast('Login failed: ' + e.message); }
}

async function signOutUser() {
  await auth.signOut();
  myList = JSON.parse(localStorage.getItem('myList') || '[]');
  renderMyList();
  showToast('Signed out');
}

auth.onAuthStateChanged(async user => {
  currentUser = user;
  syncAuthUI(user);
  if (user) {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists) {
      myList = doc.data().list || [];
      localStorage.setItem('myList', JSON.stringify(myList));
      showToast('✓ Synced from cloud');
    }
    renderMyList();
  }
});

/* ============================================================
   SONG DATA  (must match index.html)
   ============================================================ */
const SONGS = [
  { id:1,  title:"Clinical Stasis",              artist:"FocusFlow",  duration:255,  genre:"Ambient",  cover:["#0d3b6e","#1a6fa8"], icon:"🔬", src:"music/Clinical Stasis.mp3" },
  { id:2,  title:"Crystalline Lattice",          artist:"FocusFlow",  duration:232,  genre:"Ambient",  cover:["#1a1a2e","#3a3a8e"], icon:"💎", src:"music/Crystalline Lattice.mp3" },
  { id:3,  title:"Glacial Pressure again",       artist:"FocusFlow",  duration:306,  genre:"Ambient",  cover:["#2c3e50","#4a6fa5"], icon:"🧊", src:"music/Glacial Pressure again.mp3" },
  { id:4,  title:"Glacial Pressure from faraway", artist:"FocusFlow",  duration:374,  genre:"Ambient",  cover:["#2d4a3e","#4a8b6f"], icon:"🧊", src:"music/Glacial Pressure from faraway.mp3" },
  { id:5,  title:"Glacial Pressure",              artist:"FocusFlow",  duration:388,  genre:"Ambient",  cover:["#3e2d1e","#6b4a3a"], icon:"🧊", src:"music/Glacial Pressure.mp3" },
  { id:6,  title:"Glass Clinic",                  artist:"FocusFlow",  duration:310,  genre:"Ambient",  cover:["#6d4c2a","#a0714a"], icon:"🏥", src:"music/Glass Clinic.mp3" },
  { id:7,  title:"Locked Room in the Furnace",    artist:"FocusFlow",  duration:350,  genre:"Ambient",  cover:["#6e3a1e","#c46a3a"], icon:"🔥", src:"music/Locked Room in the Furnace.mp3" },
  { id:8,  title:"Monolith Below",                artist:"FocusFlow",  duration:479,  genre:"Ambient",  cover:["#1e2a3e","#3a4a6e"], icon:"🗿", src:"music/Monolith Below.mp3" },
  { id:9,  title:"Monolith at 100m",              artist:"FocusFlow",  duration:275,  genre:"Ambient",  cover:["#1e3a2e","#3a6b4f"], icon:"🗿", src:"music/Monolith at 100m.mp3" },
  { id:10, title:"Sterile Orbit",                 artist:"FocusFlow",  duration:292,  genre:"Ambient",  cover:["#0d3b6e","#2a5fa8"], icon:"🛸", src:"music/Sterile Orbit.mp3" },
  { id:11, title:"Sterile tube",                  artist:"FocusFlow",  duration:295,  genre:"Ambient",  cover:["#1a1a3e","#3a3a8e"], icon:"🧪", src:"music/Sterile tube.mp3" },
];

/* ============================================================
   STATE
   ============================================================ */
let myList    = JSON.parse(localStorage.getItem('myList')    || '[]');
let popCounts = JSON.parse(localStorage.getItem('popCounts') || '{}');
let removedStack = [];   // undo stack: [{id, index}]

let currentSongId = null;
let isPlaying     = false;
let loopMode      = 1;          // 0 off | 1 list | 2 single  — default: list loop
let isShuffle     = false;
let globalVolume  = parseFloat(localStorage.getItem('globalVolume') || '0.7');
let isMuted       = false;
let prevVolume    = globalVolume;

let fakeProgress  = 0;
let progressTimer = null;
let fakeDuration  = 0;

/* ============================================================
   HELPERS
   ============================================================ */
function songById(id) { return SONGS.find(s => s.id === id); }
function fmtTime(secs) {
  const m = Math.floor(secs / 60), s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}
function fmtDur(n) {
  const m = Math.floor(n / 60), s = Math.floor(n % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

/* ============================================================
   RENDER
   ============================================================ */
function renderMyList() {
  const container = document.getElementById('mylist-content');
  const songs = myList.map(id => songById(id)).filter(Boolean);

  if (songs.length === 0) {
    container.innerHTML = `
      <div class="mylist-empty">
        <div style="font-size:3rem">🎧</div>
        <p>Your list is empty. <a href="index.html">Browse tracks</a> and add your favourites.</p>
      </div>`;
    return;
  }

  // Toolbar
  let html = `
    <div class="mylist-toolbar">
      <span class="mylist-count">${songs.length} track${songs.length > 1 ? 's' : ''}</span>
      <button class="btn-play-all" onclick="playAll()" aria-label="Play all tracks in list">
        ▶ Play All
      </button>
    </div>`;

  songs.forEach((song, i) => {
    const nowPlaying = (song.id === currentSongId);
    html += `
    <div class="mylist-item${nowPlaying ? ' playing' : ''}"
         data-id="${song.id}" draggable="true"
         ondragstart="dragStart(event)" ondragover="dragOver(event)"
         ondragenter="dragEnter(event)" ondragleave="dragLeave(event)"
         ondrop="dragDrop(event)" ondragend="dragEnd(event)">
      <span class="drag-handle" title="Drag to reorder" aria-hidden="true">⠿</span>
      <div class="song-cover" style="background:linear-gradient(135deg,${song.cover[0]},${song.cover[1]});width:38px;height:38px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;position:relative;overflow:hidden;">
        <span>${song.icon}</span>
        <div class="eq-bars" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
      </div>
      <button class="play-btn" onclick="playSong(${song.id})" aria-label="${nowPlaying && isPlaying ? 'Pause' : 'Play'} ${song.title}">
        ${nowPlaying && isPlaying ? '⏸' : '▶'}
      </button>
      <div class="mylist-info">
        <div class="mylist-title">${song.title}</div>
        <div class="mylist-artist">${song.artist} · ${song.genre} · ${fmtDur(song.duration)}</div>
      </div>
      <button class="remove-btn" onclick="removeSong(${song.id})" aria-label="Remove ${song.title}">Remove</button>
    </div>`;
  });

  // Undo bar
  if (removedStack.length > 0) {
    const last = songById(removedStack[removedStack.length - 1].id);
    html += `
    <div style="text-align:center;margin-top:18px">
      <button class="undo-btn" onclick="undoRemove()">
        ↩ Undo — restore "${last ? last.title : 'last track'}"
      </button>
    </div>`;
  }

  container.innerHTML = html;
}

/* ============================================================
   REMOVE / UNDO  (with popularity sync)
   ============================================================ */
async function removeSong(id) {
  const idx = myList.indexOf(id);
  myList = myList.filter(x => x !== id);
  removedStack.push({ id, index: idx });

  if (popCounts[id] && popCounts[id] > 0) {
    popCounts[id]--;
    if (popCounts[id] === 0) delete popCounts[id];
    localStorage.setItem('popCounts', JSON.stringify(popCounts));
  }
  localStorage.setItem('myList', JSON.stringify(myList));
  showToast('Track removed');
  renderMyList();
  if (currentUser) await saveMyListToFirestore();
}

async function undoRemove() {
  if (removedStack.length === 0) return;
  const { id, index } = removedStack.pop();
  if (!myList.includes(id)) {
    myList.splice(index, 0, id);
    popCounts[id] = (popCounts[id] || 0) + 1;
    localStorage.setItem('popCounts', JSON.stringify(popCounts));
    localStorage.setItem('myList', JSON.stringify(myList));
  }
  showToast('↩ Restored to list');
  renderMyList();
  if (currentUser) await saveMyListToFirestore();
}

/* ============================================================
   PLAY ALL
   ============================================================ */
function playAll() {
  const songs = myList.map(id => songById(id)).filter(Boolean);
  if (songs.length === 0) return;
  playSong(songs[0].id);
}

/* ============================================================
   PLAYBACK
   ============================================================ */
function playSong(id) {
  if (currentSongId === id && isPlaying) { pausePlayer(); return; }
  if (currentSongId === id && !isPlaying) { resumePlayer(); return; }
  currentSongId = id;
  isPlaying = true;
  const song = songById(id);
  document.getElementById('p-title').textContent  = song.title;
  document.getElementById('p-artist').textContent = `${song.artist} · ${song.genre}`;
  document.getElementById('btn-play-main').textContent = '⏸';
  fakeProgress = 0;
  fakeDuration = song.duration;
  document.getElementById('p-total').textContent = fmtDur(song.duration);
  startFakeProgress();
  renderMyList();
  showToast(`▶ ${song.title}`);
}

function pausePlayer() {
  isPlaying = false;
  document.getElementById('btn-play-main').textContent = '▶';
  clearInterval(progressTimer);
  renderMyList();
}

function resumePlayer() {
  isPlaying = true;
  document.getElementById('btn-play-main').textContent = '⏸';
  startFakeProgress();
  renderMyList();
}

function togglePlay() {
  if (!currentSongId) { playAll(); return; }
  if (isPlaying) pausePlayer(); else resumePlayer();
}

const LOOP_ICONS  = ['🔁','🔁','🔂'];
const LOOP_LABELS = ['Loop off','List loop','Single loop'];
function cycleLoop() {
  loopMode = (loopMode + 1) % 3;
  const btn = document.getElementById('btn-loop');
  btn.classList.toggle('active', loopMode > 0);
  btn.textContent = LOOP_ICONS[loopMode];
  showToast(LOOP_LABELS[loopMode]);
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  document.getElementById('btn-shuffle').classList.toggle('active', isShuffle);
  showToast(isShuffle ? '🔀 Shuffle on' : '🔀 Shuffle off');
}

function toggleMute() {
  isMuted = !isMuted;
  const icon = document.querySelector('.vol-icon');
  if (isMuted) { prevVolume = globalVolume; globalVolume = 0; document.getElementById('volume-slider').value = 0; if (icon) icon.textContent = '🔇'; }
  else { globalVolume = prevVolume || 0.7; document.getElementById('volume-slider').value = globalVolume; if (icon) icon.textContent = '🔊'; localStorage.setItem('globalVolume', globalVolume); }
}

function playPrev() {
  const list = myList.map(id => songById(id)).filter(Boolean);
  if (!currentSongId || !list.length) return;
  const idx = list.findIndex(s => s.id === currentSongId);
  if (idx > 0) playSong(list[idx - 1].id);
  else if (loopMode === 1) playSong(list[list.length - 1].id);
}

function playNext(auto = false) {
  const list = myList.map(id => songById(id)).filter(Boolean);
  if (!currentSongId || !list.length) return;
  if (auto && loopMode === 2) { playSong(currentSongId); return; }
  if (isShuffle) {
    const others = list.filter(s => s.id !== currentSongId);
    if (others.length) playSong(others[Math.floor(Math.random() * others.length)].id);
    return;
  }
  const idx = list.findIndex(s => s.id === currentSongId);
  if (idx < list.length - 1) playSong(list[idx + 1].id);
  else if (loopMode === 1) playSong(list[0].id);
  else pausePlayer();
}

function startFakeProgress() {
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    if (!isPlaying) return;
    fakeProgress++;
    if (fakeProgress >= fakeDuration) {
      fakeProgress = fakeDuration; clearInterval(progressTimer);
      playNext(true); return;
    }
    const pct = (fakeProgress / fakeDuration) * 100;
    document.getElementById('progress-slider').value = pct;
    document.getElementById('p-current').textContent = fmtTime(fakeProgress);
  }, 1000);
}

function seekTo(v) {
  fakeProgress = Math.round((v / 100) * fakeDuration);
  document.getElementById('p-current').textContent = fmtTime(fakeProgress);
}

function setVolume(v) {
  globalVolume = parseFloat(v); isMuted = globalVolume === 0;
  localStorage.setItem('globalVolume', globalVolume);
  const icon = document.querySelector('.vol-icon');
  if (icon) icon.textContent = isMuted ? '🔇' : (globalVolume < 0.4 ? '🔉' : '🔊');
}

/* ============================================================
   DRAG & DROP REORDER
   ============================================================ */
let dragSrcId = null;

function dragStart(e) {
  dragSrcId = parseInt(e.currentTarget.dataset.id);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dragEnter(e) { e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function dragEnd(e)   { e.currentTarget.classList.remove('dragging'); }

async function dragDrop(e) {
  e.preventDefault();
  const targetId = parseInt(e.currentTarget.dataset.id);
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcId === targetId) return;

  const fromIdx = myList.indexOf(dragSrcId);
  const toIdx   = myList.indexOf(targetId);
  if (fromIdx < 0 || toIdx < 0) return;

  myList.splice(fromIdx, 1);
  myList.splice(toIdx, 0, dragSrcId);
  localStorage.setItem('myList', JSON.stringify(myList));
  renderMyList();
  if (currentUser) await saveMyListToFirestore();
}

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  switch(e.key) {
    case ' ':         e.preventDefault(); togglePlay();  break;
    case 'ArrowLeft': e.preventDefault(); playPrev();    break;
    case 'ArrowRight':e.preventDefault(); playNext();    break;
    case 's': case 'S': toggleShuffle(); break;
    case 'l': case 'L': cycleLoop();     break;
    case 'm': case 'M': toggleMute();    break;
  }
});

/* ============================================================
   TOAST / NAV
   ============================================================ */
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2600);
}
function toggleNav() { document.querySelector('.header-right').classList.toggle('open'); }

/* ============================================================
   INIT
   ============================================================ */
document.getElementById('volume-slider').value = globalVolume;
renderMyList();
</script>
</body>
</html>
